<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#3b82f6">
  <title>Артиллерийский Калькулятор</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="glass-panel">
      <h1>Арт-Калькулятор</h1>
      <p class="subtitle">Arma 3 · RHS + ACE</p>
      <div class="header-inputs">
        <label for="weaponSelect">Орудие:</label>
        <select id="weaponSelect">
          <option value="">Загрузка таблиц...</option>
        </select>
      </div>
    </header>

    <main>
      <!-- Positions -->
      <section class="glass-panel card">
        <h2>Позиции</h2>
        <div class="grid-2">
          <div class="input-group">
            <label>Координаты огневой (X Y)</label>
            <div class="coord-inputs">
              <input type="number" id="gunX" placeholder="X" aria-label="Огневая X">
              <input type="number" id="gunY" placeholder="Y" aria-label="Огневая Y">
            </div>
          </div>
          <div class="input-group">
            <label>Координаты цели (X Y)</label>
            <div class="coord-inputs">
              <input type="number" id="tgtX" placeholder="X" aria-label="Цель X">
              <input type="number" id="tgtY" placeholder="Y" aria-label="Цель Y">
            </div>
          </div>
          <div class="input-group">
            <label for="gunAlt">Высота огневой, м</label>
            <input type="number" id="gunAlt" placeholder="0">
          </div>
          <div class="input-group">
            <label for="tgtAlt">Высота цели, м</label>
            <input type="number" id="tgtAlt" placeholder="0">
          </div>
        </div>
      </section>

      <!-- Weather -->
      <section class="glass-panel card">
        <h2>Метеоусловия</h2>
        <div class="grid-2">
          <div class="input-group">
            <label>Направление ветра (откуда дует)</label>
            <div class="coord-inputs">
              <input type="number" id="windDir" placeholder="0" aria-label="Направление ветра">
              <select id="windUnit" aria-label="Единица направления ветра" class="unit-select">
                <option value="mil">мил</option>
                <option value="deg">град</option>
              </select>
            </div>
          </div>
          <div class="input-group">
            <label for="windSpeed">Скорость ветра, м/с</label>
            <input type="number" id="windSpeed" placeholder="0" step="0.1" min="0">
          </div>
          <div class="input-group">
            <label for="tempC">Температура воздуха, °C</label>
            <input type="number" id="tempC" placeholder="15" step="1">
          </div>
          <div class="input-group">
            <label for="pressure">Давление, гПа</label>
            <input type="number" id="pressure" placeholder="1013" step="1">
          </div>
          <div class="input-group">
            <label for="humidity">Влажность, %</label>
            <input type="number" id="humidity" placeholder="50" min="0" max="100">
          </div>
        </div>
      </section>

      <!-- Action -->
      <button id="calcBtn" class="primary-btn pulse">РАССЧИТАТЬ</button>

      <!-- Results -->
      <section class="glass-panel card results-card hidden" id="resultsPanel" aria-live="polite">
        <h2>Результат</h2>
        <div class="computed-wind" id="computedWind"></div>
        <div class="results-grid">
          <div class="res-item"><span class="label">Дистанция, м</span><span class="val" id="resDist">-</span></div>
          <div class="res-item"><span class="label">Азимут, мил</span><span class="val" id="resAz">-</span></div>
          <div class="res-item highlight"><span class="label">Лучший заряд</span><span class="val" id="resCharge">-</span></div>
          <div class="res-item highlight"><span class="label">Угол возвыш. (мил)</span><span class="val" id="resElevMil">-</span></div>
          <div class="res-item"><span class="label">Угол возвыш. (°)</span><span class="val" id="resElevDeg">-</span></div>
          <div class="res-item"><span class="label">Попр. по азимуту</span><span class="val" id="resAzCorr">-</span></div>
          <div class="res-item highlight"><span class="label">Итоговый азимут</span><span class="val" id="resFinalAz">-</span></div>
          <div class="res-item"><span class="label">Время полёта (с)</span><span class="val" id="resTOF">-</span></div>
          <div class="res-item"><span class="label">Δ Высоты (м)</span><span class="val" id="resDeltaH">-</span></div>
          <div class="res-item"><span class="label">R-эфф (м)</span><span class="val" id="resEffDist">-</span></div>
        </div>
      </section>

      <!-- All Charges -->
      <section class="glass-panel card hidden" id="allChargesPanel">
        <h2>Все доступные заряды</h2>
        <div class="table-wrap">
          <table class="charges-table">
            <thead>
              <tr><th>Заряд</th><th>Угол (мил)</th><th>Азимут (мил)</th><th>TOF (с)</th></tr>
            </thead>
            <tbody id="allChargesBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="tables/tables.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.warn('SW failed:', err));
      });
    }
  </script>
</body>
</html>
